<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(
135deg,
#667eea,
#764ba2
);
height:100vh;
}

.login-box{

background:white;
padding:40px;
border-radius:25px;
box-shadow:0px 0px 30px rgba(0,0,0,0.3);

margin-top:100px;

}

.form-control{

height:50px;
border-radius:15px;

}

.btn-login{

height:50px;
border-radius:15px;
font-size:18px;

}

</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-md-5">

<div class="login-box">

<h2 class="text-center mb-4">
🔐 User Login
</h2>

<form method="POST">

<input type="text"
class="form-control mb-3"
placeholder="Username"
name="username">

<input type="password"
class="form-control mb-3"
placeholder="Password"
name="password">

<button class="btn btn-primary w-100 btn-login">
Login
</button>

</form>

<hr>

<p class="text-center">
Don't have an account?
<a href="/register">
Register
</a>
</p>

</div>

</div>

</div>

</div>

</body>
</html>
