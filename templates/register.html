<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
background: linear-gradient(
135deg,
#4f46e5,
#06b6d4,
#14b8a6
);
display:flex;
justify-content:center;
align-items:center;
font-family:'Segoe UI',sans-serif;
}

.register-box{

width:500px;
padding:40px;

background:rgba(255,255,255,0.15);

backdrop-filter:blur(15px);

border-radius:25px;

box-shadow:0 8px 32px rgba(0,0,0,0.3);

color:white;

}

.form-control{

height:50px;
border-radius:15px;
border:none;

}

.form-control:focus{

box-shadow:none;

}

.btn-register{

height:50px;
border-radius:15px;
font-size:18px;
font-weight:bold;

}

.logo{

font-size:60px;

}

</style>

</head>

<body>

<div class="register-box">

<div class="text-center">

<div class="logo">🛡️</div>

<h2>FraudShield Pro</h2>

<p>Create Your Account</p>

</div>

<form method="POST">

<div class="mb-3">

<label class="form-label">
Full Name
</label>

<input type="text"
class="form-control"
name="fullname"
placeholder="Enter Full Name"
required>

</div>

<div class="mb-3">

<label class="form-label">
Email Address
</label>

<input type="email"
class="form-control"
name="email"
placeholder="Enter Email"
required>

</div>

<div class="mb-3">

<label class="form-label">
Username
</label>

<input type="text"
class="form-control"
name="username"
placeholder="Choose Username"
required>

</div>

<div class="mb-3">

<label class="form-label">
Password
</label>

<input type="password"
class="form-control"
name="password"
placeholder="Create Password"
required>

</div>

<div class="mb-3">

<label class="form-label">
Confirm Password
</label>

<input type="password"
class="form-control"
name="confirm_password"
placeholder="Confirm Password"
required>

</div>

<button type="submit"
class="btn btn-warning w-100 btn-register">

Create Account

</button>

</form>

<div class="text-center mt-3">

Already have an account?

<a href="/login"
class="text-white fw-bold">

Login

</a>

</div>

</div>

</body>

</html>
